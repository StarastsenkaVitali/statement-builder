<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Statement Designer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Statement Designer</h1>

  <div class="meta-row">
    <label>Statement name:</label>
    <input type="text" id="stmtName" value="RESTORE" oninput="renderOutput()" size="18">
    <button onclick="saveToFile()">💾 Save</button>
    <button onclick="document.getElementById('loadInput').click()">📂 Load</button>
    <input type="file" id="loadInput" accept=".json" style="display:none" onchange="loadFromFile(this.files[0])">
    <button onclick="exportDocx()">📄 Export DOCX</button>
  </div>

  <p class="hint">
    Left: define operands and their values. Values have 3 kinds:
    <span class="tag-kind keyword">keyword</span> fixed token (e.g. *STD) &nbsp;
    <span class="tag-kind simple">simple</span> typed user input (e.g. &lt;filename&gt;) &nbsp;
    <span class="tag-kind nested">nested</span> value with sub-operands &nbsp;
    <span class="tag-kind list">list</span> up to N items of a simple type
  </p>

  <div class="columns">
    <div class="col-builder">
      <h2>Schema Builder</h2>
      <div id="builder"></div>
      <div class="toplevel-add">
        <button class="add" onclick="addOperand(schema)">+ Add operand</button>
        <button onclick="resetSchema()">Reset example</button>
        <button onclick="clearSchema()">Clear all</button>
      </div>
    </div>

    <div class="col-form">
      <h2>Interactive Form</h2>
      <div id="form"></div>
      <h2 style="margin-top:12px;">Generated statement</h2>
      <div id="output"></div>
    </div>
  </div>

  <script src="script.js"></script>

</body>

</html>
