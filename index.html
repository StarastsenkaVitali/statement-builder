<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Statement Designer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Statement Designer</h1>

  <div class="meta-row">
    <label>Statement name:</label>
    <input type="text" id="stmtName" value="RESTORE" oninput="renderOutput()" size="18">
    <button id="undoBtn" onclick="undo()" title="Undo (Ctrl+Z)" disabled>↶ Undo</button>
    <button id="redoBtn" onclick="redo()" title="Redo (Ctrl+Y)" disabled>↷ Redo</button>
    <button onclick="saveToFile()">💾 Save</button>
    <button onclick="document.getElementById('loadInput').click()">📂 Load</button>
    <input type="file" id="loadInput" accept=".json" style="display:none" onchange="loadFromFile(this.files[0])">
    <button onclick="exportDocx()">📄 Export DOCX</button>
    <button onclick="exportHtml()">🌐 Export HTML</button>
    <button onclick="loadExample()" style="border-color:#0052CC;color:#0052CC;">📋 RESTORE-FILES example</button>
  </div>

  <p class="hint">
    Value kinds:
    <span class="tag-kind keyword">keyword</span> fixed token (e.g. *STD) &nbsp;
    <span class="tag-kind simple">simple</span> one of the predefined types &nbsp;
    <span class="tag-kind nested">nested</span> value with sub-operands &nbsp;
    <span class="tag-kind list">list</span> list-poss(N) of a simple type
  </p>

  <div class="columns">
    <div class="col-builder">
      <h2>Schema Builder</h2>
      <div id="builder"></div>
      <div class="toplevel-add">
        <button class="add" onclick="addOperand(schema)">+ Add operand</button>
        <button onclick="resetSchema()">Reset example</button>
        <button onclick="clearSchema()">Clear all</button>
      </div>
    </div>

    <div class="col-form">
      <h2>Interactive Form</h2>
      <div id="form"></div>
      <h2 style="margin-top:12px;">Generated statement</h2>
      <div id="output-wrap">
        <button id="copy-output" onclick="copyOutput(this)" title="Copy statement as one line">Copy</button>
        <div id="output"></div>
      </div>
    </div>
  </div>

  <!-- Description Modal -->
  <div id="modal-overlay">
    <div id="modal-box">
      <h3 id="modal-title">Descriptions</h3>
      <div id="modal-body"></div>
      <div class="modal-footer">
        <button onclick="closeDescModal()">Cancel</button>
        <button onclick="saveDescModal()"
          style="background:#0052CC;color:#fff;border-color:#003a9b;font-weight:bold;">💾 Save</button>
      </div>
    </div>
  </div>

  <script src="rsf.js"></script>
  <script src="script.js"></script>
</body>

</html>
